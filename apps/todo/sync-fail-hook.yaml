---
apiVersion: batch/v1
kind: Job
metadata:
  name: syncfail-cleanup
  namespace: sync-waves
  annotations:
    argocd.argoproj.io/hook: SyncFail
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: cleanup
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
          args:
            - |
              TARGET_NS="sync-waves"
              SELECTOR="cleanup.argocd/example=sync-waves"

              echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Argo CD Sync ist fehlgeschlagen."
              echo "Bereinige markierte Ressourcen in Namespace ${TARGET_NS} mit Selector: ${SELECTOR}"

              sleep 10

              oc delete route,service,deployment,job,serviceaccount,rolebinding,role \
                -n "${TARGET_NS}" \
                -l "${SELECTOR}" \
                --ignore-not-found=true

              echo "Zusätzliche Bereinigung von Pods/ReplicaSets/PVCs mit gleichem Label"
              oc delete pod,replicaset,pvc \
                -n "${TARGET_NS}" \
                -l "${SELECTOR}" \
                --ignore-not-found=true

              echo "Cleanup abgeschlossen."
