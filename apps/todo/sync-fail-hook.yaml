---
apiVersion: batch/v1
kind: Job
metadata:
  name: syncfail-cleanup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: SyncFail
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: cleanup
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -ec
          args:
            - |
              TARGET_NS="sync-waves"
              SELECTOR="cleanup.argocd/example=sync-waves"

              echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] Sync fehlgeschlagen. Starte Cleanup in ${TARGET_NS}"

              #
              # Wichtig:
              # Nicht auch per Selector rolebindings/roles löschen, weil sonst
              # mitten im Lauf die eigenen Rechte weg sind.
              #
              oc delete route,service,deployment,job,serviceaccount,secret \
                -n "${TARGET_NS}" \
                -l "${SELECTOR}" \
                --ignore-not-found=true \
                --wait=false

              oc delete pod,replicaset,pvc \
                -n "${TARGET_NS}" \
                -l "${SELECTOR}" \
                --ignore-not-found=true \
                --wait=false

              #
              # Optional ganz am Ende:
              # Wenn auch das RoleBinding gelöscht werden soll, dann nur explizit
              # als allerletzten Schritt.
              #
              # oc delete rolebinding admin-rolebinding \
              #   -n "${TARGET_NS}" \
              #   --ignore-not-found=true \
              #   --wait=false

              echo "Cleanup abgeschlossen."
